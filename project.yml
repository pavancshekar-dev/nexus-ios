name: Nexus
options:
  bundleIdPrefix: com.qpiai
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_PREVIEWS: "YES"

packages:
  llama:
    url: https://github.com/ggerganov/llama.cpp
    from: "4000.0.0"
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    branch: main

targets:
  Nexus:
    type: application
    platform: iOS
    sources:
      - path: NexusApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.qpiai.nexus
        PRODUCT_NAME: Nexus
        INFOPLIST_FILE: NexusApp/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        OTHER_LDFLAGS: ["-lc++"]
    dependencies:
      - package: llama
    info:
      path: NexusApp/Info.plist

  NexusChat:
    type: application
    platform: iOS
    sources:
      - path: NexusChat
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.qpiai.nexuschat
        PRODUCT_NAME: NexusChat
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        CODE_SIGN_ENTITLEMENTS: NexusChat/NexusChat.entitlements
    dependencies:
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXVLM
      - package: mlx-swift-lm
        product: MLXLMCommon
