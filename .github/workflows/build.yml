name: Build iOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-nexuschat:
    name: Build NexusChat (MLX)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: .spm-cache
          key: spm-nexuschat-${{ hashFiles('project.yml', 'Package.swift') }}
          restore-keys: spm-nexuschat-

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build NexusChat
        run: |
          set -o pipefail
          xcodebuild build \
            -project Nexus.xcodeproj \
            -scheme NexusChat \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -clonedSourcePackagesDirPath .spm-cache \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee build.log | tail -50
          echo "Build exit code: ${PIPESTATUS[0]}"

  build-nexus:
    name: Build Nexus (llama.cpp)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: .spm-cache
          key: spm-nexus-${{ hashFiles('project.yml') }}
          restore-keys: spm-nexus-

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Nexus
        run: |
          set -o pipefail
          xcodebuild build \
            -project Nexus.xcodeproj \
            -scheme Nexus \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -clonedSourcePackagesDirPath .spm-cache \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            2>&1 | tee build.log | tail -50
          echo "Build exit code: ${PIPESTATUS[0]}"
